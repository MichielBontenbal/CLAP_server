<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vibe Sound — live mel spectrogram</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    background: #0d1017;
    color: #d7dce5;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  header {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    box-sizing: border-box;
  }
  h1 { font-size: 1.05rem; font-weight: 600; margin: 0; flex: 1; }
  #status { font-size: 0.85rem; color: #8b93a3; }
  button {
    font: inherit;
    padding: 0.5rem 1.4rem;
    border-radius: 999px;
    border: 1px solid #3a4254;
    background: #1c2333;
    color: #e8ecf3;
    cursor: pointer;
  }
  button.live { background: #36c46d; border-color: #36c46d; color: #06200f; font-weight: 600; }
  #stage {
    width: 100%;
    max-width: 1100px;
    padding: 0 1.25rem 1.5rem;
    box-sizing: border-box;
    display: flex;
    gap: 0.5rem;
  }
  #axis {
    position: relative;
    width: 3.2rem;
    flex: none;
    font-size: 0.7rem;
    color: #8b93a3;
  }
  #axis span {
    position: absolute;
    right: 0.3rem;
    transform: translateY(-50%);
    white-space: nowrap;
  }
  #wrap { position: relative; flex: 1; min-width: 0; }
  canvas {
    width: 100%;
    height: min(60vh, 480px);
    display: block;
    background: #440154;
    border-radius: 6px;
    image-rendering: pixelated;
  }
  #meter {
    flex: none;
    display: grid;
    grid-template-columns: 1.1rem 1.7rem;
    grid-template-rows: min(60vh, 480px) auto;
    column-gap: 0.25rem;
  }
  #meter-track {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    background: #131927;
  }
  #meter-grad {
    position: absolute;
    inset: 0;
    /* dark green (quiet, bottom) to dark red (loud, top) */
    background: linear-gradient(to top,
      #0a3d0a 0%, #2e7d32 40%, #9e9d24 60%, #e65100 80%, #b71c1c 92%, #7f0000 100%);
  }
  #meter-mask {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 100%;
    background: #131927;
    transition: height 0.05s linear;
  }
  #meter-peak {
    position: absolute;
    left: 0; right: 0;
    top: 100%;
    height: 2px;
    background: #e8ecf3;
  }
  #meter-scale { position: relative; font-size: 0.6rem; color: #5b6373; }
  #meter-scale span { position: absolute; transform: translateY(50%); }
  #meter-readout {
    grid-column: 1 / 3;
    font-size: 0.65rem;
    color: #8b93a3;
    text-align: center;
    padding-top: 0.3rem;
    font-variant-numeric: tabular-nums;
  }
  footer { font-size: 0.75rem; color: #5b6373; padding-bottom: 1rem; }
</style>
</head>
<body>
<header>
  <h1>Vibe Sound <span style="color:#8b93a3;font-weight:400">— live mel spectrogram</span></h1>
  <span id="status">idle</span>
  <button id="toggle">Start</button>
</header>

<div id="stage">
  <div id="axis"></div>
  <div id="wrap"><canvas id="spec" width="1024" height="80"></canvas></div>
  <div id="meter">
    <div id="meter-track">
      <div id="meter-grad"></div>
      <div id="meter-mask"></div>
      <div id="meter-peak"></div>
    </div>
    <div id="meter-scale"></div>
    <div id="meter-readout">&ndash;</div>
  </div>
</div>
<footer>80 mel bins · FFT 2048 · hop 512 · processed server-side by FastAPI</footer>

<script>
const canvas = document.getElementById('spec');
const ctx2d = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const toggleBtn = document.getElementById('toggle');
const axisEl = document.getElementById('axis');

// --- viridis colormap: 8 anchor colours, linearly interpolated into a 256-entry LUT
const anchors = ['#440154','#46327e','#365c8d','#277f8e','#1fa187','#4ac16d','#a0da39','#fde725']
  .map(h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]);
const lut = new Uint8ClampedArray(256 * 3);
for (let i = 0; i < 256; i++) {
  const t = i / 255 * (anchors.length - 1);
  const a = anchors[Math.floor(t)], b = anchors[Math.min(Math.ceil(t), anchors.length - 1)];
  const f = t - Math.floor(t);
  for (let c = 0; c < 3; c++) lut[i*3 + c] = a[c] + (b[c] - a[c]) * f;
}

let audioCtx = null, stream = null, ws = null, running = false;
let nMels = 80, column = null;

// --- VU / peak meter (0..meterMax dB): fast attack, slow release, peak hold
const meterMask = document.getElementById('meter-mask');
const meterPeak = document.getElementById('meter-peak');
const meterReadout = document.getElementById('meter-readout');
const meterScale = document.getElementById('meter-scale');
let meterMax = 110, vuDb = 0, peakDb = 0;

function buildMeterScale() {
  meterScale.innerHTML = '';
  for (let db = 0; db <= meterMax; db += 20) {
    const tick = document.createElement('span');
    tick.style.bottom = `${db / meterMax * 100}%`;
    tick.textContent = db;
    meterScale.appendChild(tick);
  }
}
buildMeterScale();

function setMeter(db) {
  vuDb = Math.max(db, vuDb - 2.5);          // release ~55 dB/s at 43 ms updates
  peakDb = Math.max(db, peakDb - 0.5);      // peak marker decays slowly
  meterMask.style.height = `${(1 - vuDb / meterMax) * 100}%`;
  meterPeak.style.top = `${(1 - peakDb / meterMax) * 100}%`;
  meterReadout.textContent = `${db.toFixed(0)} dB`;
}

function resetMeter() {
  vuDb = 0; peakDb = 0;
  meterMask.style.height = '100%';
  meterPeak.style.top = '100%';
  meterReadout.textContent = '–';
}

function setStatus(text) { statusEl.textContent = text; }

function hzToMel(f) { return 2595 * Math.log10(1 + f / 700); }

function drawAxis(cfg) {
  axisEl.innerHTML = '';
  const melLo = hzToMel(cfg.fmin), melHi = hzToMel(cfg.fmax);
  for (const hz of [100, 250, 500, 1000, 2000, 4000, 8000, 16000]) {
    if (hz < cfg.fmin || hz > cfg.fmax) continue;
    const frac = (hzToMel(hz) - melLo) / (melHi - melLo);
    const label = document.createElement('span');
    label.style.top = `${(1 - frac) * 100}%`;
    label.textContent = hz >= 1000 ? `${hz / 1000} kHz` : `${hz} Hz`;
    axisEl.appendChild(label);
  }
  axisEl.style.height = getComputedStyle(canvas).height;
}

function drawFrames(buf) {
  const bytes = new Uint8Array(buf);
  const nFrames = bytes.length / nMels;
  ctx2d.drawImage(canvas, -nFrames, 0);
  for (let f = 0; f < nFrames; f++) {
    for (let y = 0; y < nMels; y++) {
      const v = bytes[f * nMels + (nMels - 1 - y)]; // low freqs at the bottom
      const o = y * 4;
      column.data[o] = lut[v*3]; column.data[o+1] = lut[v*3+1];
      column.data[o+2] = lut[v*3+2]; column.data[o+3] = 255;
    }
    ctx2d.putImageData(column, canvas.width - nFrames + f, 0);
  }
}

async function start() {
  setStatus('requesting mic…');
  stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
  });
  audioCtx = new AudioContext();
  await audioCtx.audioWorklet.addModule('/static/capture-processor.js');

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  await new Promise((resolve, reject) => {
    ws.onopen = resolve;
    ws.onerror = () => reject(new Error('WebSocket connection failed'));
  });
  ws.send(JSON.stringify({ sampleRate: audioCtx.sampleRate }));

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      const msg = JSON.parse(e.data);
      if (msg.type === 'level') {
        setMeter(msg.db);
      } else {
        nMels = msg.nMels;
        meterMax = msg.meterMax || 110;
        buildMeterScale();
        canvas.height = nMels;
        column = ctx2d.createImageData(1, nMels);
        drawAxis(msg);
        setStatus(`live · ${Math.round(msg.sampleRate / 1000)} kHz`);
      }
    } else {
      drawFrames(e.data);
    }
  };
  ws.onclose = () => { if (running) stop('connection lost'); };

  // Batch worklet chunks (128 samples each) into ~2048-sample packets.
  const source = audioCtx.createMediaStreamSource(stream);
  const node = new AudioWorkletNode(audioCtx, 'capture');
  source.connect(node);
  let pending = [], pendingLen = 0;
  node.port.onmessage = (e) => {
    pending.push(e.data);
    pendingLen += e.data.length;
    if (pendingLen >= 2048 && ws.readyState === WebSocket.OPEN) {
      const packet = new Float32Array(pendingLen);
      let off = 0;
      for (const chunk of pending) { packet.set(chunk, off); off += chunk.length; }
      ws.send(packet.buffer);
      pending = []; pendingLen = 0;
    }
  };

  running = true;
  toggleBtn.textContent = 'Stop';
  toggleBtn.classList.add('live');
}

function stop(reason) {
  running = false;
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  toggleBtn.textContent = 'Start';
  toggleBtn.classList.remove('live');
  resetMeter();
  setStatus(reason || 'stopped');
}

toggleBtn.onclick = async () => {
  if (running) { stop(); return; }
  try {
    await start();
  } catch (err) {
    stop(err.message);
  }
};
</script>
</body>
</html>
